name: ML Pipeline

on:
  push:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install "dvc[s3]"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Pull dataset from S3
      run: dvc pull

    - name: Train model
      run: python src/train.py

    - name: Upload metrics
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: metrics.json

    - name: Show Results in GitHub Summary
      run: |
        echo "## Lab 8 Result - Version 2 (2022BCD0057)" >> $GITHUB_STEP_SUMMARY
        python -c "import json; d=json.load(open('metrics.json')); print(f'Dataset Size: {d[\"dataset_size\"]}\nRMSE: {d[\"RMSE\"]}\nR2: {d[\"R2\"]}')" >> $GITHUB_STEP_SUMMARY

    - name: Build Docker image
      run: docker build -t housing-model .

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      run: |
        docker tag housing-model ${{ secrets.DOCKER_USERNAME }}/housing-model:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/housing-model:latest